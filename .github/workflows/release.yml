name: Build & Auto Release Electron App

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 📥 checkout code
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🟢 Node setup
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # 📦 install deps (clean install)
      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # 🔍 debug vite
      - name: Check vite
        working-directory: frontend
        run: npx vite --version

      # ⚡ build frontend
      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # 🚀 build exe
      - name: Build Windows EXE
        working-directory: frontend
        run: npx electron-builder --win --x64

      # 📌 ใช้ tag name ตรง ๆ
      - name: Set version
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      # 🚀 Create GitHub Release (เฉพาะตอน tag เท่านั้น)
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Flash Boot Tool ${{ env.VERSION }}
          body: |
            🔥 Auto Release Build
            Version: ${{ env.VERSION }}

            ✔ Windows EXE included
            ✔ Auto update supported
          files: |
            frontend/dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
