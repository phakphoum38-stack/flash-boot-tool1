name: Build & Auto Release Electron App

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 📥 clone repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🟢 setup node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # 📦 install deps (FIX: ใช้ install แทน ci)
      - name: Install dependencies
        working-directory: frontend
        run: npm install

      # 🔍 debug
      - name: Check vite
        working-directory: frontend
        run: npx vite --version

      # ⚡ build frontend
      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # 🚀 build exe
      - name: Build EXE
        working-directory: frontend
        run: npx electron-builder --win --x64

      # 🧪 เก็บไฟล์ไว้ดู (กันพัง)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe-build
          path: frontend/dist/*.exe

      # 🚀 สร้าง release เฉพาะตอน tag
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
