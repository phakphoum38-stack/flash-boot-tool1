name: Build & Auto Release Electron App

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 📦 install deps (รวม vite + electron)
      - name: Install dependencies
        working-directory: frontend
        run: npm install

      # 🔧 debug ว่ามี vite ไหม
      - name: Check vite
        working-directory: frontend
        run: npx vite --version

      # ⚡ build frontend
      - name: Build frontend
        working-directory: frontend
        run: npx vite build   # 👈 ใช้ npx แทน npm script กันพลาด

      # 🚀 build exe
      - name: Build Windows EXE
        working-directory: frontend
        run: npx electron-builder --win --x64

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Flash Boot Tool ${{ env.VERSION }}
          body: |
            🔥 Auto Release Build
            - Windows EXE
            - Version: ${{ env.VERSION }}
          files: |
            frontend/dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
